name: Android Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Decode keystore
        run: |
          mkdir -p android/TourGraph/keystore
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/TourGraph/keystore/tourgraph-release.jks

      - name: Create keystore.properties
        run: |
          cat > android/TourGraph/keystore.properties << EOF
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=../keystore/tourgraph-release.jks
          EOF

      - name: Build release APK
        working-directory: android/TourGraph
        run: ./gradlew assembleRelease

      - name: Build release AAB
        working-directory: android/TourGraph
        run: ./gradlew bundleRelease

      - name: Rename artifacts
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          cp android/TourGraph/app/build/outputs/apk/release/app-release.apk TourGraph-${VERSION}.apk
          cp android/TourGraph/app/build/outputs/bundle/release/app-release.aab TourGraph-${VERSION}.aab

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            TourGraph-*.apk
            TourGraph-*.aab
          generate_release_notes: true
          draft: false
